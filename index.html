<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>North Star Outfitters — Support Chat</title>
  <meta name="description" content="North Star Support Bot — customer support demo for North Star Outfitters (outdoor apparel & camping gear)." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="chat-card" aria-label="North Star Outfitters support chat">
    <header class="chat-header">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 48 48" width="30" height="30">
          <polygon points="6,40 20,16 29,30 34,22 44,40" fill="#0f241d" opacity="0.55"/>
          <path d="M24 4 l2.6 6.2 6.7.6 -5.1 4.4 1.5 6.5 -5.7-3.5 -5.7 3.5 1.5-6.5 -5.1-4.4 6.7-.6z" fill="#f3c56b"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>North Star Outfitters</h1>
        <p id="status"><span class="dot dot-online" aria-hidden="true"></span> North Star Support Bot · Online</p>
      </div>
      <button id="restart" class="restart" type="button" title="Restart conversation" aria-label="Restart conversation">↻</button>
    </header>

    <div id="messages" class="messages" aria-live="polite"></div>

    <div id="chips" class="chips" role="group" aria-label="Quick replies"></div>

    <form id="composer" class="composer" autocomplete="off">
      <input id="input" type="text" placeholder="Type a message…" aria-label="Type a message" maxlength="500" />
      <button type="submit" class="send" aria-label="Send message">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M3 20 L21 12 L3 4 L6 12 Z" fill="currentColor"/>
        </svg>
      </button>
    </form>

    <p class="demo-hint">Demo bot with simulated data — try orders <strong>#111</strong>, <strong>#222</strong>, <strong>#333</strong></p>
  </main>

  <script src="js/data.js"></script>
  <script src="js/intents.js"></script>
  <script src="js/flows.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
